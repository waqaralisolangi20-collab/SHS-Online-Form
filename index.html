<form id="registrationForm"
      action="https://formsubmit.co/waqar.ali.solangi.20@gmail.com"
      method="POST">

  <input type="hidden" name="_subject"
         value="New SHS Online Registration">

  <input type="hidden" name="_template" value="table">

  <input type="hidden" name="_captcha" value="false">

  <div class="form-row">
    <label>
      پورا نام
      <input type="text" name="Full Name" required>
    </label>

    <label>
      موبائل نمبر
      <input type="tel" name="Mobile Number" required>
    </label>
  </div>

  <div class="form-row">
    <label>
      ضلع
      <input type="text" name="District" required>
    </label>

    <label>
      تعلقہ / شہر
      <input type="text" name="Tehsil or City" required>
    </label>
  </div>

  <label>
    کمیونٹی / NGO کی تفصیل
    <textarea name="Community or NGO Details"
              rows="5"
              required></textarea>
  </label>

  <label class="check">
    <input type="checkbox" required>
    <span>
      میں تصدیق کرتا/کرتی ہوں کہ یہ ایک نجی registration/support portal ہے۔
    </span>
  </label>

  <button type="submit" class="primary-btn full">
    درخواست جمع کریں ←
  </button>

  <div id="formMessage" class="form-message"></div>

</form>
